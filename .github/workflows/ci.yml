name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coaching_mgmt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d coaching_mgmt_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coaching_mgmt_test?schema=public
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/coaching_mgmt_test?schema=public
      EMAIL_DELIVERY_MODE: console
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: noreply@example.test
      AUTH_MODE: email
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npx prisma validate
      - run: npm run test:unit
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build

  migrate-production:
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # One-time: marks the baseline migration as already applied (it
      # describes the schema as it already exists in prod, nothing to run).
      # Errors harmlessly on every run after the first, since Prisma refuses
      # to re-resolve an already-resolved migration.
      - name: Resolve baseline migration
        run: npx prisma migrate resolve --applied 20260716151441_baseline
        continue-on-error: true
      - name: Deploy pending migrations to production
        run: npx prisma migrate deploy
