name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coaching_mgmt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d coaching_mgmt_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coaching_mgmt_test?schema=public
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/coaching_mgmt_test?schema=public
      EMAIL_DELIVERY_MODE: console
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: noreply@example.test
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npx prisma validate
      - run: npm run test:unit
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
